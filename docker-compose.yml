version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: phishlab_postgres
    environment:
      POSTGRES_DB: phishlab
      POSTGRES_USER: phishlab
      POSTGRES_PASSWORD: PhishLab2026!Secure
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - phishlab_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U phishlab -d phishlab"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: phishlab_backend
    environment:
      FLASK_ENV: production
      DATABASE_URL: postgresql://phishlab:PhishLab2026!Secure@postgres:5432/phishlab
      SECRET_KEY: "${SECRET_KEY:-change-me-in-production-use-openssl-rand-hex-64}"
      MAIL_SERVER: "${MAIL_SERVER:-smtp.gmail.com}"
      MAIL_PORT: "${MAIL_PORT:-587}"
      MAIL_USE_TLS: "True"
      MAIL_USERNAME: "${MAIL_USERNAME}"
      MAIL_PASSWORD: "${MAIL_PASSWORD}"
      PHISHING_DOMAIN: "${PHISHING_DOMAIN:-localhost}"
      INTERNAL_NETWORK: "10.0.10.0/24"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/phishing_pages:/app/phishing_pages
      - ./backend/logs:/app/logs
      - ./backend/static/images:/app/static/images
    networks:
      - phishlab_net
    restart: unless-stopped
    ports:
      - "5000:5000"

  dashboard:
    image: nginx:alpine
    container_name: phishlab_dashboard
    volumes:
      - ./dashboard/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./dashboard/html:/usr/share/nginx/html:ro
    depends_on:
      - backend
    networks:
      - phishlab_net
    restart: unless-stopped
    ports:
      - "8080:80"

  elk:
    image: sebp/elk:8.15.0
    container_name: phishlab_elk
    environment:
      ELSA_SITENAME: PhishLab
      ELASTICSEARCH_STARTUP_TIMEOUT: 10m
    volumes:
      - elk_data:/var/lib/elasticsearch
    networks:
      - phishlab_net
    restart: unless-stopped
    ports:
      - "5601:5601"
      - "9200:9200"
      - "5044:5044"
    mem_limit: 4g

  msfconsole:
    image: remnux/metasploit
    container_name: phishlab_msf
    environment:
      MSF_DATABASE_NAME: msf
      MSF_DATABASE_USERNAME: msf
      MSF_DATABASE_PASSWORD: MsfLab2026!Secure
      DATABASE_URL: postgresql://msf:MsfLab2026!Secure@postgres:5432/msf
    volumes:
      - ./workspace:/root/workspace
    networks:
      - phishlab_net
    restart: unless-stopped

volumes:
  postgres_data:
  elk_data:

networks:
  phishlab_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.10.0/24
